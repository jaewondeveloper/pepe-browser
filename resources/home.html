<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>새 탭</title>
    <link rel="stylesheet" href="ntp.css" />
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  </head>
  <body>
    <header class="top-links">
      <a href="https://mail.google.com/" target="_self">Gmail</a>
      <a href="https://www.google.com/imghp" target="_self">이미지</a>
      <button type="button" class="icon-btn" title="실험실" aria-label="실험실">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#5f6368" d="M7 2v2H5v2H3v8h2v2h2v2h2v-2h2v-2h2v-2h-2V6h-2V4h-2V2H7zm0 4h2v8H7V6z"/>
        </svg>
      </button>
      <button type="button" class="icon-btn" title="Google 앱" aria-label="Google 앱">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#5f6368" d="M6 8c0-1.1.9-2 2-2h8c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2H8c-1.1 0-2-.9-2-2V8zm2 0v8h8V8H8z"/>
        </svg>
      </button>
      <button type="button" class="avatar" title="Google 계정" aria-label="계정"></button>
    </header>

    <main class="ntp">
      <h1 class="logo" aria-label="Google">
        <span class="g">G</span><span class="o1">o</span><span class="o2">o</span
        ><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
      </h1>

      <form class="search-box" id="search-form" role="search">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#9aa0a6" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </span>
        <input
          id="search-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Google 검색 또는 URL 입력"
        />
        <div class="search-actions">
          <button type="button" class="icon-btn" title="음성 검색" aria-label="음성 검색">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#4285f4" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
              <path fill="#34a853" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <button type="button" class="icon-btn" title="이미지로 검색" aria-label="렌즈">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="#ea4335" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
              <path fill="#4285f4" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            </svg>
          </button>
          <button type="button" class="ai-mode">AI 모드</button>
        </div>
      </form>

      <section class="shortcuts" aria-label="바로가기">
        <a class="shortcut" data-url="https://github.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="" /></span>
          <span class="label">GitHub</span>
        </a>
        <a class="shortcut" data-url="https://www.youtube.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64" alt="" /></span>
          <span class="label">YouTube</span>
        </a>
        <a class="shortcut" data-url="https://chatgpt.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=chatgpt.com&sz=64" alt="" /></span>
          <span class="label">ChatGPT</span>
        </a>
        <a class="shortcut" data-url="https://github.com/jaewondeveloper">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="" /></span>
          <span class="label">jaewondeveloper</span>
        </a>
        <a class="shortcut" data-url="https://gemini.google.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=gemini.google.com&sz=64" alt="" /></span>
          <span class="label">Google Gemini</span>
        </a>
        <a class="shortcut" data-url="https://www.ebsi.co.kr/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=ebsi.co.kr&sz=64" alt="" /></span>
          <span class="label">EBSI</span>
        </a>
        <a class="shortcut" data-url="https://mail.naver.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=naver.com&sz=64" alt="" /></span>
          <span class="label">맑은편지함 (724)</span>
        </a>
        <a class="shortcut" data-url="https://github.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="" /></span>
          <span class="label">Dashboard</span>
        </a>
        <a class="shortcut" data-url="https://www.naver.com/">
          <span class="icon"><img src="https://www.google.com/s2/favicons?domain=xn--9i1b58x0wv0ov.com&sz=64" alt="" /></span>
          <span class="label">내도메인.한국</span>
        </a>
        <button type="button" class="shortcut add" id="add-shortcut">
          <span class="icon">+</span>
          <span class="label">바로가기 추가</span>
        </button>
      </section>
    </main>

    <button type="button" class="customize" id="customize-btn">
      <svg viewBox="0 0 24 24" width="16" height="16">
        <path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
      </svg>
      Chrome 맞춤설정
    </button>

    <script src="ntp.js"></script>
  </body>
</html>
