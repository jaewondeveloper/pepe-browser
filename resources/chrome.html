<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Pepe Browser Chrome</title>
    <link rel="stylesheet" href="chrome.css" />
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  </head>
  <body>
    <div class="chrome">
      <div class="tab-strip drag-region" id="tab-strip">
        <div class="tab-left no-drag">
          <div class="tabs no-drag" id="tabs"></div>
          <button type="button" class="new-tab no-drag" id="btn-new-tab" title="새 탭">
            <svg viewBox="0 0 16 16" width="12" height="12"><path fill="currentColor" d="M8 3.5a.5.5 0 0 1 .5.5v3.5H12a.5.5 0 0 1 0 1H8.5V12a.5.5 0 0 1-1 0V8.5H4a.5.5 0 0 1 0-1h3.5V4a.5.5 0 0 1 .5-.5z"/></svg>
          </button>
        </div>
        <div class="tab-strip-spacer drag-region"></div>
        
        <div class="right-controls no-drag">
          <button type="button" class="gemini-btn" id="btn-gemini">
            <svg class="gemini-icon" viewBox="0 0 24 24" width="12" height="12">
              <path fill="url(#gemini-grad)" d="M12 2a1 1 0 0 1 .93.64l2.28 5.61 5.61 2.28a1 1 0 0 1 0 1.86l-5.61 2.28-2.28 5.61a1 1 0 0 1-1.86 0l-2.28-5.61-5.61-2.28a1 1 0 0 1 0-1.86l5.61-2.28 2.28-5.61A1 1 0 0 1 12 2z"/>
              <defs>
                <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4285f4" />
                  <stop offset="100%" stop-color="#9b51e0" />
                </linearGradient>
              </defs>
            </svg>
            Gemini에게 물어보기
          </button>
          
          <div class="window-controls">
            <button type="button" id="btn-min" title="최소화" aria-label="최소화">
              <svg viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="0.6"/></svg>
            </button>
            <button type="button" id="btn-max" title="최대화" aria-label="최대화">
              <svg viewBox="0 0 10 10"><rect width="8" height="8" x="1" y="1" fill="none" stroke="currentColor" stroke-width="0.6"/></svg>
            </button>
            <button type="button" id="btn-close" title="닫기" aria-label="닫기">
              <svg viewBox="0 0 10 10"><path stroke="currentColor" stroke-width="0.6" d="M1.5 1.5l7 7M8.5 1.5l-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="toolbar">
        <div class="nav-buttons no-drag">
          <button type="button" id="btn-back" title="뒤로" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <button type="button" id="btn-forward" title="앞으로" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/></svg>
          </button>
          <button type="button" id="btn-reload" title="새로고침">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          </button>
        </div>
        
        <div class="omnibox-wrap no-drag">
          <span class="omnibox-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="#5f6368" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2 .9 2 2v1h2c.9 0 1.64.58 1.9 1.39.31 1 .51 2.06.51 3.11 0 4.08-3.05 7.44-7 7.93z"/>
            </svg>
          </span>
          <input
            type="text"
            id="omnibox"
            spellcheck="false"
            placeholder="Google에서 검색하거나 URL을 입력하세요."
            autocomplete="off"
          />
          <div class="omnibox-actions">
            <button type="button" class="ob-icon" title="이 페이지 공유"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg></button>
            <button type="button" class="ob-icon" title="이 탭 북마크"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg></button>
            <button type="button" class="ob-icon" title="측면 패널 표시"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 16H5V5h7v14zm7 0h-5V5h5v14z"/></svg></button>
            <button type="button" class="ob-icon" title="확장 프로그램"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5a2.5 2.5 0 0 0-5 0V5H4c-1.1 0-2 .9-2 2v4h1.5a2.5 2.5 0 0 1 0 5H2v4c0 1.1.9 2 2 2h4v-1.5a2.5 2.5 0 0 1 5 0V20h4c1.1 0 2-.9 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
    <div id="tab-context-menu" class="tab-context-menu" hidden>
      <button type="button" data-action="new-tab">새 탭</button>
      <button type="button" data-action="reload-tab">새로고침</button>
      <button type="button" data-action="close-tab">탭 닫기</button>
      <button type="button" data-action="close-others">다른 탭 닫기</button>
    </div>
    <script src="chrome.js"></script>
  </body>
</html>
